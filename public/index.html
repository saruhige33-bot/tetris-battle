<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TETRIS BATTLE</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <section id="view-title" class="view active">
    <h1 class="title-logo">TETRIS BATTLE</h1>
    <div class="menu">
      <button id="btn-mode-cpu" class="btn btn-primary">CPU対戦</button>
      <button id="btn-mode-online" class="btn btn-primary">友達と対戦</button>
    </div>
    <div id="cpu-difficulty-panel" class="panel hidden">
      <h2>CPUの強さを選択</h2>
      <div class="menu">
        <button class="btn" data-difficulty="easy">弱め</button>
        <button class="btn" data-difficulty="normal">ちょうどいい</button>
        <button class="btn" data-difficulty="hard">最強</button>
      </div>
      <button id="btn-cpu-back" class="btn btn-secondary">戻る</button>
    </div>
  </section>

  <section id="view-lobby" class="view">
    <h2>友達と対戦</h2>
    <div class="menu">
      <button id="btn-room-create" class="btn btn-primary">ルームを作る</button>
    </div>
    <div class="menu join-menu">
      <input id="input-room-code" maxlength="6" placeholder="ルームコード入力" />
      <button id="btn-room-join" class="btn btn-primary">入室する</button>
    </div>
    <p id="lobby-error" class="error-text"></p>
    <div id="lobby-waiting" class="panel hidden">
      <p>ルームコード: <span id="lobby-room-code" class="room-code"></span></p>
      <p>このコードを友達に送ってください</p>
      <p id="lobby-status">対戦相手を待っています…</p>
    </div>
    <button id="btn-lobby-back" class="btn btn-secondary">戻る</button>
  </section>

  <section id="view-game" class="view">
    <div class="game-layout">
      <div class="board-panel">
        <h3>YOU</h3>
        <canvas id="canvas-self" width="250" height="500"></canvas>
        <div class="score-panel">SCORE: <span id="self-score">0</span></div>
      </div>
      <div class="side-panel">
        <div>
          <h4>HOLD</h4>
          <canvas id="canvas-hold" width="100" height="100"></canvas>
        </div>
        <div>
          <h4>NEXT</h4>
          <canvas id="canvas-next" width="100" height="100"></canvas>
        </div>
      </div>
      <div class="board-panel">
        <h3 id="opponent-label">CPU</h3>
        <canvas id="canvas-opponent" width="250" height="500"></canvas>
        <div class="score-panel">SCORE: <span id="opponent-score">0</span></div>
      </div>
    </div>
  </section>

  <section id="view-result" class="view">
    <h1 id="result-title">YOU WIN</h1>
    <p id="result-score"></p>
    <div class="menu">
      <button id="btn-result-retry" class="btn btn-primary">もう一度</button>
      <button id="btn-result-title" class="btn btn-secondary">タイトルへ</button>
    </div>
  </section>

</div>
<script src="/socket.io/socket.io.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
